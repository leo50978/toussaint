<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vichly Messenger Hors Ligne</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 20%, rgba(194, 65, 12, 0.16), transparent 28%),
          radial-gradient(circle at 85% 15%, rgba(15, 92, 77, 0.18), transparent 22%),
          linear-gradient(145deg, #f5efe3 0%, #ebe3d1 46%, #f7f1e6 100%);
        color: #1e1b16;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid rgba(30, 27, 22, 0.08);
        border-radius: 32px;
        padding: 32px;
        background: rgba(255, 253, 247, 0.95);
        box-shadow: 0 24px 80px rgba(30, 27, 22, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.8rem);
      }

      p {
        margin: 16px 0 0;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        margin-top: 20px;
        padding: 12px 18px;
        border-radius: 16px;
        background: #0f5c4d;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mode hors ligne</h1>
      <p>
        Vichly Messenger ne peut pas joindre le reseau pour le moment. Les ecrans
        caches restent accessibles et la connexion reprendra des que possible.
      </p>
      <a href="/">Retour a l accueil</a>
    </main>
  </body>
 </html>
